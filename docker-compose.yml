services:
  credit-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-engine:local
    container_name: credit-engine
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: staging
      PORT: 3000
      ENABLE_SWAGGER: "${ENABLE_SWAGGER:-true}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
